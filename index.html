<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحفيز الورش التدريبية</title>
  <style>
    /* أنماط تصميم احترافية هنا */
    body { font-family: 'Cairo', sans-serif; background: #f4f7fc; display: flex; justify-content: center; padding: 20px; }
    .dashboard { max-width: 900px; width: 100%; }
    .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .header { text-align: center; color: #1a2b4c; }
    .stats { display: flex; justify-content: space-around; flex-wrap: wrap; }
    .stat-item { background: #eef2f7; padding: 15px 30px; border-radius: 40px; margin: 10px; }
    .podium { display: flex; justify-content: center; align-items: flex-end; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .podium-item { text-align: center; padding: 15px; background: #f8faff; border-radius: 16px; min-width: 120px; }
    .rank-1 { background: #ffd700; color: #333; } .rank-2 { background: #c0c0c0; } .rank-3 { background: #cd7f32; }
    .last-employee { background: linear-gradient(145deg, #6c5ce7, #a29bfe); color: white; text-align: center; padding: 20px; border-radius: 20px; font-size: 1.5rem; }
    .loading { text-align: center; padding: 50px; font-size: 1.5rem; color: #888; }
  </style>
</head>
<body>
<div class="dashboard" id="app">
  <div class="card header">
    <h1>🚀 لوحة تحفيز الورش التدريبية</h1>
    <p>نحتفي بجهود زملائنا في التطوير المستمر</p>
  </div>

  <div id="loadingMessage" class="loading">⏳ جاري تحميل البيانات...</div>

  <div id="content" style="display: none;">
    <div class="card stats">
      <div class="stat-item">📚 إجمالي الورش المسجلة: <span id="totalWorkshops">0</span></div>
      <div class="stat-item">🔄 آخر تحديث: <span id="lastUpdated"></span></div>
    </div>

    <div class="card">
      <h2 style="text-align: center;">🏆 أفضل ثلاثة موظفين في التسجيل</h2>
      <div class="podium" id="topEmployees">
        <!-- سيتم ملؤها بواسطة JavaScript -->
      </div>
    </div>

    <div class="card last-employee">
      <div>🌟 آخر موظف قام بالتسجيل</div>
      <div style="font-size: 2rem; font-weight: bold;" id="lastEmployee">-</div>
    </div>
  </div>
</div>

<script>
  // استبدل THIS_IS_YOUR_APP_SCRIPT_URL بالرابط الذي نسخته من نشر تطبيق الويب
  const API_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';

  async function loadDashboard() {
    const loading = document.getElementById('loadingMessage');
    const content = document.getElementById('content');

    try {
      const response = await fetch(API_URL);
      if (!response.ok) throw new Error('Network response was not ok');
      const data = await response.json();

      // تحديث الإحصائيات
      document.getElementById('totalWorkshops').textContent = data.totalWorkshops || 0;
      document.getElementById('lastUpdated').textContent = data.lastUpdated || '-';
      document.getElementById('lastEmployee').textContent = data.lastEmployee || 'لا يوجد';

      // عرض أفضل 3 موظفين
      const topContainer = document.getElementById('topEmployees');
      topContainer.innerHTML = ''; // تفريغ المحتوى القديم

      if (data.topEmployees && data.topEmployees.length > 0) {
        const medals = ['🥇', '🥈', '🥉'];
        data.topEmployees.forEach((emp, index) => {
          const div = document.createElement('div');
          div.className = `podium-item rank-${index + 1}`;
          div.innerHTML = `
            <div style="font-size: 3rem;">${medals[index] || '🏅'}</div>
            <div style="font-weight: bold; font-size: 1.2rem;">${emp.name}</div>
            <div style="font-size: 0.9rem; opacity: 0.8;">${emp.count} ورشة</div>
          `;
          topContainer.appendChild(div);
        });
      } else {
        topContainer.innerHTML = '<p>لا توجد بيانات كافية لعرض أفضل الموظفين.</p>';
      }

      // إظهار المحتوى وإخفاء رسالة التحميل
      loading.style.display = 'none';
      content.style.display = 'block';

    } catch (error) {
      console.error('Error fetching data:', error);
      loading.textContent = '❌ حدث خطأ في تحميل البيانات. يرجى المحاولة لاحقاً.';
    }
  }

  // استدعاء الدالة عند تحميل الصفحة
  document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
