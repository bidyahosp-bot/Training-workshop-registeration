<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - منصة التدريب</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #1a7a3a 0%, #0d4a24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        
        .offline-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }
        
        .offline-container h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .offline-container p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        
        .offline-container .sub-text {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        
        .retry-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 14px 40px;
            background: #fff;
            color: #1a7a3a;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
        }
        
        .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .retry-btn:active {
            transform: scale(0.95);
        }
        
        .cached-data {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .cached-data i {
            margin-left: 8px;
        }
        
        @media (max-width: 480px) {
            .offline-container {
                padding: 30px 20px;
            }
            
            .offline-icon {
                font-size: 60px;
            }
            
            .offline-container h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <span class="offline-icon">📡</span>
        <h1>غير متصل بالإنترنت</h1>
        <p>عذراً، لا يمكن تحميل الصفحة المطلوبة.</p>
        <p>يرجى التحقق من اتصالك بالشبكة والمحاولة مرة أخرى.</p>
        
        <button class="retry-btn" onclick="location.reload()">
            🔄 إعادة المحاولة
        </button>
        
        <div class="cached-data">
            <i class="fas fa-database"></i>
            سيتم عرض البيانات المخزنة محلياً عند توفرها.
        </div>
    </div>
    
    <script>
        // محاولة التحميل من الكاش تلقائياً
        if ('caches' in window) {
            caches.match('/').then(response => {
                if (response) {
                    // يوجد نسخة مخزنة، يمكن توجيه المستخدم
                    console.log('📦 توجد نسخة مخزنة من التطبيق');
                }
            });
        }
        
        // مراقبة حالة الاتصال
        window.addEventListener('online', function() {
            location.reload();
        });
    </script>
</body>
</html>
